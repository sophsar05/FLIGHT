    function restoreQuizAnswers(){Object.keys(answered).forEach(key=>{const i=Number(key),selected=answered[key],right=questions[i][2],card=document.getElementById('q'+i);if(!card)return;const buttons=card.querySelectorAll('.answer');card.classList.add('answered');buttons[selected]?.classList.add(selected===right?'correct':'wrong');buttons[right]?.classList.add('correct')});updateQuiz(true)}
    function updateQuiz(skipAnimation=false){let p=progress(),fill=document.getElementById('quizFill'),count=document.getElementById('count'),percent=document.getElementById('percent');if(!fill||!count||!percent)return;count.textContent=Object.keys(answered).length;percent.textContent=p+'%';if(reducedMotion.matches||skipAnimation){fill.style.width=p+'%'}else{fill.animate([{width:fill.style.width||'0%'},{width:p+'%'}],{duration:220,easing:'cubic-bezier(.25,1,.5,1)'}).onfinish=()=>fill.style.width=p+'%'}document.querySelectorAll('.dot').forEach((d,i)=>{d.classList.toggle('good',answered[i]===questions[i][2]);d.classList.toggle('bad',answered[i]!==undefined&&answered[i]!==questions[i][2])})}
    function showScoreModal(){document.querySelector('.modal-backdrop')?.remove();pauseQuizTimer();quizSessionActive=false;let answeredCount=Object.keys(answered).length;let correct=questions.reduce((sum,q,i)=>sum+(answered[i]===q[2]?1:0),0);let total=questions.length;let wrong=answeredCount-correct;let percent=Math.round(correct/total*100);let modal=document.createElement('div');modal.className='modal-backdrop';modal.innerHTML=`<div class="score-modal glass" style="--score-angle:${percent*3.6}deg"><div class="kicker">Quiz Complete</div><h1>Your Score</h1><p class="sub score-message">Review your result first. After this popup, you can continue back to the lessons page.</p><div class="score-ring"><div class="score-ring-inner"><div class="score-percent">${percent}%</div></div></div><div class="score-grid"><div class="score-stat"><b>${correct}</b><span>Correct</span></div><div class="score-stat"><b>${wrong}</b><span>Wrong</span></div><div class="score-stat"><b>${total-answeredCount}</b><span>Skipped</span></div></div><div class="actions score-actions"><button class="btn secondary" onclick="closeSetup();renderQuiz()">Retake</button><button class="btn primary" onclick="closeSetup();renderLessons();setNav('lessons')">Continue to Lessons</button></div></div>`;document.body.appendChild(modal);animateSurface(modal)}
    function jumpToQ(i){document.getElementById('q'+i)?.scrollIntoView({behavior:'smooth'});document.querySelectorAll('.dot').forEach((d,x)=>d.classList.toggle('current',x===i))}
    function startTimer(){let label=document.getElementById('timerText');if(!label)return;label.textContent=formatTime(quizElapsed);timer=setInterval(()=>{quizElapsed+=1;label.textContent=formatTime(quizElapsed)},1000)}
    applyTheme();renderLessons();
  </script>
</body>
</html>
